<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Учебный мессенджер" />
    <title>Messenger</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <a class="brand" href="/">
          <span class="logo">M</span>
          <span>messenger</span>
        </a>
        <div class="server-status" id="server-status" aria-live="polite">
          <span class="status-dot"></span>
          <span class="status-text">проверяем сервер</span>
        </div>
      </header>

      <section class="auth-card" aria-labelledby="form-title">
        <div class="heading">
          <h1 id="form-title">Добро пожаловать</h1>
          <p id="form-subtitle">Войдите, чтобы продолжить общение</p>
        </div>

        <div class="mode-switch" role="tablist" aria-label="Режим авторизации">
          <button class="mode-button active" type="button" role="tab" aria-selected="true" data-mode="login">Вход</button>
          <button class="mode-button" type="button" role="tab" aria-selected="false" data-mode="register">Регистрация</button>
        </div>

        <form id="auth-form" novalidate>
          <label class="field">
            <span>Логин</span>
            <input id="username" name="username" type="text" autocomplete="username" placeholder="Введите логин" maxlength="50" required />
            <small class="field-error" data-error-for="username"></small>
          </label>

          <label class="field">
            <span>Пароль</span>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Введите пароль" required />
            <small class="field-error" data-error-for="password"></small>
          </label>

          <label class="field confirm-field" hidden>
            <span>Повторите пароль</span>
            <input id="password-confirm" name="password_confirm" type="password" autocomplete="new-password" placeholder="Введите пароль ещё раз" />
            <small class="field-error" data-error-for="password-confirm"></small>
          </label>

          <button class="submit-button" type="submit" id="submit-button">Войти</button>
        </form>
      </section>

      <footer>учебный проект · 2026</footer>
    </main>

    <script src="/static/app.js" defer></script>
  </body>
</html>
